provider = "WEB_SERVER"

[webserver]
base = "apache"
enable_https = true

[webserver.php]
version = "8.4" # Explicitly setting PHP version

[webserver.apache]
document_root = "public"

[phases.setup]
nixPkgs = [
  "php84Extensions.pdo_mysql",
  "php84Extensions.mysqli",
]

[phases.install]
cmds = [
    "composer install --no-dev --no-interaction --prefer-dist",
    "npm install",
    "npm run build", # Assuming 'npm run build' exists and builds frontend assets
    "rm -f .env" # Railway injects env vars at runtime
]

[build]
commands = [
    "php artisan config:clear", # Clear config before build
    "php artisan cache:clear",  # Clear cache
    "php artisan view:clear",   # Clear view cache
]

[start]
cmd = "apache2-foreground" # Explicitly starting Apache
